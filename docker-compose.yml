version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shipyard-postgres
    restart: always
    environment:
      POSTGRES_USER: shipyard_user
      POSTGRES_PASSWORD: shipyard_secret_password
      POSTGRES_DB: shipyard_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
