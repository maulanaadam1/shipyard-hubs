version: '3.9'

services:
  shipyard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shipyard-hub
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Asia/Jakarta
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-vivo1234_change_in_prod}
      - NEXT_PUBLIC_DEFAULT_ADMIN_EMAIL=${NEXT_PUBLIC_DEFAULT_ADMIN_EMAIL:-admin@shipyard.local}
      - NEXT_PUBLIC_DEFAULT_ADMIN_PASSWORD=${NEXT_PUBLIC_DEFAULT_ADMIN_PASSWORD:-admin123}
      - DATABASE_PATH=/data/shipyard.sqlite
    volumes:
      # Persist SQLite database across container restarts
      - shipyard_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/session"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  shipyard_data:
    driver: local
